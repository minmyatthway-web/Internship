<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <div class="mx-auto w-1/2 p-4 bg-gray-300 shadow-md rounded-lg mt-10 flex justify-around gap-1">
        <div class="flex-col-2">
            <p class="text-4xl text-blue-600">Update Variables</p>
            <div class="flex flex-col gap- mt-4">
                <label for="Name">Name(String):</label>
                <div>
                    <input type="text" id="Name" name="Name">
                </div>

                <label for="Age">Age(Number):</label>
                <div>
                    <input type="number" id="Age" name="Age">
                </div>

                <label for="Boolean">VIP Stautus(Boolean):</label>
                <div>
                    <input type="checkbox" id="Boolean" name="Boolean">
                </div>
                <label for="Color" name="Color">Card Color:</label>
                <div>
                    <input type="color" id="Color" name="Color">
                </div>
            </div>

        </div>
        <div class="flex-col-2 ">
            <p class="text-4xl text-blue-600">Live DOM Output</p>
            <div class="w-[160px] bg-blue-300 rounded-lg p-4 mt-10 p-4">
                <p>648384885387</p>
                <p>Age: 15</p>
            </div>
        </div>

    </div>


</body>

</html>
