<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <main class="bg-slate-400 p-4 grid sm:grid-cols-1 md:grid-cols-2 gap-8">
        <div class="bg-white p-4 rounded-lg">
            <span class="bg-amber-400 p-1 rounded-lg">🪟</span>
            <h1 class="font-extrabold">2.4k</h1>
            <p class="text-xs text-gray-500">Page Views</p>
        </div>
        <div class="bg-white p-4 rounded-lg">
            <span class="bg-amber-400 p-1 rounded-lg">💰</span>
            <h1 class="font-extrabold">$8.2k</h1>
            <p class="text-xs text-gray-500">Revenue</p>

        </div>
        <div class="bg-white p-4 rounded-lg">
            <span class="bg-amber-400 p-1 rounded-lg">👥</span>
            <h1 class="font-extrabold">892</h1>
            <p class="text-xs text-gray-500">New Users</p>
        </div>
        <div class="bg-white p-4 rounded-lg">
            <p class="bg-amber-400 p-1 rounded-lg inline">⭐</p>
            <h1 class="font-extrabold">4.9</h1>
            <p class="text-xs text-gray-500">Rating</p>
        </div>
    </main>
</body>
</html>
